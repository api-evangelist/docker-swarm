aid: docker-swarm
name: Docker Swarm
description: >-
  Native clustering and orchestration solution for Docker containers that
  turns a pool of Docker hosts into a single virtual host. Docker Swarm
  enables deploying applications across multiple machines and provides
  high availability and load balancing for containerized workloads.
